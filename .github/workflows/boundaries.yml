name: boundaries

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: تشغيل مدقّق الحدود
        run: python scripts/check_boundaries.py
